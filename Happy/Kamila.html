<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Kamila 💙</title>

<link href="https://fonts.googleapis.com/css2?family=Anton&family=Poppins:wght@300&display=swap" rel="stylesheet">

<style>

/* ===== BODY ===== */
body{
margin:0;
font-family:'Poppins',sans-serif;
color:white;
overflow-x:hidden;
}

/* ===== VIDEO ===== */
#bgVideo{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-3;
}

/* ===== CAPA NETFLIX (DEGRADADO OSCURO) ===== */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background: linear-gradient(
to bottom,
rgba(0,0,0,0.7) 0%,
rgba(0,0,0,0.5) 40%,
rgba(0,0,0,0.8) 100%
);
z-index:-2;
}

/* ===== CANVAS ===== */
canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
z-index:1;
}

/* ===== HERO ===== */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
z-index:2;
position:relative;
}

/* ===== TEXTO ANIMADO ===== */
.hero h1{
font-family:'Anton';
font-size:85px;
letter-spacing:5px;

/* COLOR BASE */
color:white;

/* EFECTO CONTORNO NEÓN BLANCO */
text-shadow:
0 0 5px #fff,
0 0 10px #fff,
0 0 20px #fff,
0 0 40px #fff,
0 0 80px #fff;

/* profundidad ligera */
filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.8));

/* animación suave */
animation:fadeIn 2s ease, float 3s infinite ease-in-out;
}

/* movimiento suave */
@keyframes floatText{
0%{ transform:translateY(0); }
50%{ transform:translateY(-15px); }
100%{ transform:translateY(0); }
}

/* ===== MENSAJE ===== */
.mensaje{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:40px;
font-size:22px;
max-width:700px;
margin:auto;

opacity:0;
transform:translateY(60px);
transition:1.2s ease;

z-index:2;
position:relative;
}

/* ===== BOTON ===== */
.btn{
margin-top:30px;
padding:14px 30px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#ff4d6d,#ff8fab);
color:white;
font-size:18px;
cursor:pointer;

box-shadow:0 0 20px #ff4d6d;
transition:0.3s;
}

.btn:hover{
transform:scale(1.1);
}

/* ===== CORAZONES ===== */
.heart{
position:fixed;
width:14px;
height:14px;
background:#ff4d6d;
transform:rotate(45deg);
pointer-events:none;
animation:float 1s ease-out forwards;
}

.heart::before,
.heart::after{
content:'';
width:14px;
height:14px;
background:#ff4d6d;
border-radius:50%;
position:absolute;
}

.heart::before{ top:-7px; left:0; }
.heart::after{ left:-7px; top:0; }

@keyframes float{
to{
transform:translateY(-80px) scale(0.6) rotate(45deg);
opacity:0;
}
}

</style>
</head>

<body>

<!-- 🎥 VIDEO -->
<video autoplay muted loop playsinline id="bgVideo">
<source src="happy.mp4" type="video/mp4">
</video>

<!-- 🌑 CAPA -->
<div class="overlay"></div>

<!-- 🎆 FUEGOS -->
<canvas id="canvas"></canvas>

<!-- 💙 HERO -->
<div class="hero">
<h1>Feliz Cumpleaños Kamila 💙</h1>
</div>

<!-- 📜 MENSAJE -->
<div class="mensaje" id="mensaje">
Feliz cumpleaños, Kamila Esquerre. Hoy cumples 21 y el mundo se detiene para mirarte… 
aunque yo ya me quedé atrapado en tu sonrisa desde antes. 
Que este año te regale tantas aventuras como las que me provocas cada vez que pienso en ti. 💙

<button class="btn">De parte de Alex</button>
</div>

<script>

/* ===== SCROLL ===== */
const mensaje = document.getElementById("mensaje");

window.addEventListener("scroll", () => {
const top = mensaje.getBoundingClientRect().top;
if(top < window.innerHeight * 0.8){
mensaje.style.opacity = "1";
mensaje.style.transform = "translateY(0)";
}
});

/* ===== CORAZONES CLICK ===== */
document.addEventListener("click", (e) => {
for(let i=0;i<10;i++){
let heart = document.createElement("div");
heart.className="heart";
heart.style.left = (e.clientX + Math.random()*20-10) + "px";
heart.style.top = (e.clientY + Math.random()*20-10) + "px";
document.body.appendChild(heart);

setTimeout(()=>heart.remove(),1000);
}
});

/* ===== FUEGOS REALISTAS ===== */
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let fireworks = [];

class Firework{
constructor(){
this.x = Math.random()*canvas.width;
this.y = canvas.height;
this.targetY = Math.random()*canvas.height/2;
this.speed = 5;
this.exploded = false;
this.particles = [];
this.color = `hsl(${Math.random()*360},100%,60%)`;
}

update(){
if(!this.exploded){
this.y -= this.speed;

ctx.beginPath();
ctx.arc(this.x,this.y,3,0,Math.PI*2);
ctx.fillStyle=this.color;
ctx.shadowBlur=15;
ctx.shadowColor=this.color;
ctx.fill();

if(this.y <= this.targetY){
this.exploded = true;

for(let i=0;i<100;i++){
this.particles.push({
x:this.x,
y:this.y,
angle:Math.random()*Math.PI*2,
speed:Math.random()*6,
life:100
});
}
}
}else{
this.particles.forEach(p=>{
p.x += Math.cos(p.angle)*p.speed;
p.y += Math.sin(p.angle)*p.speed + 0.7; /* gravedad */
p.life--;

ctx.beginPath();
ctx.arc(p.x,p.y,2,0,Math.PI*2);
ctx.fillStyle=this.color;
ctx.shadowBlur=10;
ctx.shadowColor=this.color;
ctx.fill();
});

this.particles = this.particles.filter(p=>p.life>0);
}
}
}

function loop(){
ctx.clearRect(0,0,canvas.width,canvas.height);

if(Math.random()<0.06){
fireworks.push(new Firework());
}

fireworks.forEach(f=>f.update());
fireworks = fireworks.filter(f=>f.particles.length>0 || !f.exploded);

requestAnimationFrame(loop);
}

loop();
/* 🎵 ACTIVAR MÚSICA AL PRIMER CLICK */
document.addEventListener("click", () => {
  const audio = document.getElementById("bgMusic");
  audio.play();
}, { once: true });
</script>
<audio id="bgMusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>
</body>
</html>
